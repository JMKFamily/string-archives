<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>악보 목록 — String Archives</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --ink-muted: #5a5a56;
    --ink-faint: #9a9a94;
    --paper: #faf9f6;
    --paper-warm: #f2efe8;
    --staff: #d8d4c8;
    --accent: #2c4a7c;
    --accent-light: #e8eef6;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HUD 검색바 ── */
  .hud {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--staff);
  }

  .hud-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 60px;
  }

  .hud-brand {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    text-decoration: none;
    color: var(--ink);
    white-space: nowrap;
  }

  .hud-divider {
    width: 1px;
    height: 20px;
    background: var(--staff);
  }

  .search-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    color: var(--ink-faint);
    font-size: 15px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    height: 36px;
    padding: 0 12px 0 36px;
    border: 1px solid var(--staff);
    background: var(--paper-warm);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    border-radius: 0;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--ink-faint); }

  .search-clear {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 14px;
    display: none;
    padding: 4px;
  }

  /* ── 필터 탭 ── */
  .filter-bar {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.25rem 2rem 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 0.5rem;
  }

  .filter-btn {
    padding: 5px 14px;
    border: 1px solid var(--staff);
    background: transparent;
    color: var(--ink-muted);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 0;
  }

  .filter-btn:hover {
    border-color: var(--ink-muted);
    color: var(--ink);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  /* ── 결과 헤더 ── */
  .results-header {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 2rem 0.75rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--staff);
  }

  .results-count {
    font-size: 13px;
    color: var(--ink-muted);
  }

  .results-count strong { color: var(--ink); font-weight: 500; }

  .sort-select {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-muted);
    border: none;
    background: transparent;
    cursor: pointer;
    outline: none;
  }

  /* ── 악보 리스트 ── */
  .score-list {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .score-row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center;
    gap: 1.5rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--staff);
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.15s;
    cursor: pointer;
  }

  .score-row:hover { padding-left: 0.5rem; }

  .score-thumb {
    width: 56px;
    height: 72px;
    background: var(--paper-warm);
    border: 1px solid var(--staff);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .score-thumb-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6px 4px;
    gap: 3px;
  }

  .thumb-line {
    height: 1px;
    background: var(--staff);
  }

  .score-info { min-width: 0; }

  .score-row-composer {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 3px;
  }

  .score-row-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-row-meta {
    font-size: 12px;
    color: var(--ink-muted);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .score-row-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    background: var(--accent-light);
    color: var(--accent);
  }

  .score-row-right {
    text-align: right;
    flex-shrink: 0;
  }

  .score-row-price {
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }

  .score-row-parts {
    font-size: 11px;
    color: var(--ink-faint);
    white-space: nowrap;
  }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    display: none;
  }

  .empty-state p {
    font-family: var(--serif);
    font-size: 1.25rem;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
  }

  .empty-state small {
    font-size: 13px;
    color: var(--ink-faint);
  }

  /* ── 푸터 ── */
  footer {
    background: var(--paper-warm);
    border-top: 1px solid var(--staff);
    padding: 2rem;
  }

  .footer-info {
    max-width: 960px;
    margin: 0 auto;
    font-size: 12px;
    color: var(--ink-faint);
    line-height: 2;
  }

  @media (max-width: 600px) {
    .hud-inner { gap: 0.75rem; padding: 0 1rem; }
    .score-list { padding: 0 1rem 4rem; }
    .filter-bar { padding: 1rem 1rem 0; }
    .results-header { padding: 1rem 1rem 0.75rem; }
    .score-row { grid-template-columns: 44px 1fr auto; gap: 0.75rem; }
    .score-thumb { width: 44px; height: 58px; }
    .score-row-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- ── HUD ── -->
<header class="hud">
  <div class="hud-inner">
    <a href="main.html" class="hud-brand">String Archives</a>
    <div class="hud-divider" aria-hidden="true"></div>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="작곡가, 곡명, 편성으로 검색"
        aria-label="악보 검색"
        autocomplete="off"
      >
      <button class="search-clear" id="searchClear" aria-label="검색어 지우기">✕</button>
    </div>
  </div>
</header>

<!-- ── 필터 ── -->
<div class="filter-bar" role="group" aria-label="카테고리 필터">
  <span class="filter-label">장르</span>
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="symphony">교향곡 · 협주곡</button>
  <button class="filter-btn" data-filter="film">영화음악</button>
  <button class="filter-btn" data-filter="anime">애니 · 게임</button>
</div>

<!-- ── 결과 헤더 ── -->
<div class="results-header">
  <p class="results-count"><strong id="countNum">6</strong>개의 악보</p>
  <select class="sort-select" id="sortSelect" aria-label="정렬 기준">
    <option value="default">기본순</option>
    <option value="price-asc">가격 낮은순</option>
    <option value="price-desc">가격 높은순</option>
    <option value="title">제목순</option>
  </select>
</div>

<!-- ── 악보 리스트 ── -->
<main>
  <ul class="score-list" id="scoreList" role="list" aria-label="악보 목록">
  </ul>
  <div class="empty-state" id="emptyState" aria-live="polite">
    <p>검색 결과가 없습니다</p>
    <small>다른 키워드나 카테고리로 찾아보세요</small>
  </div>
</main>

<!-- ── 푸터 ── -->
<footer>
  <div class="footer-info">
    상호명: 스트링 아카이브즈 · 대표자: 배민기 · 사업자등록번호: 000-00-00000 · 이메일: contact@stringarchives.com
  </div>
</footer>

<script>
const SCORES = [
  {
    id: 1,
    composer: 'Ludwig van Beethoven',
    title: '교향곡 5번 — 1악장',
    subtitle: 'Allegro con brio',
    parts: 'V1 · V2 · Va · Vc',
    partCount: '현악 4중주',
    price: 12,
    category: 'symphony',
    tag: '퍼블릭 도메인'
  },
  {
    id: 2,
    composer: 'Ludwig van Beethoven',
    title: '교향곡 7번 — 1악장',
    subtitle: 'Poco sostenuto · Vivace',
    parts: 'V1 · V2 · Va · Vc',
    partCount: '현악 4중주',
    price: 12,
    category: 'symphony',
    tag: '퍼블릭 도메인'
  },
  {
    id: 3,
    composer: 'Pyotr Ilyich Tchaikovsky',
    title: '백조의 호수 — 왈츠',
    subtitle: 'Swan Lake Suite',
    parts: 'V1 · V2 · Va · Vc I · Vc II',
    partCount: '현악 5중주',
    price: 12,
    category: 'symphony',
    tag: '퍼블릭 도메인'
  },
  {
    id: 4,
    composer: 'One Piece OST',
    title: 'One Piece Medley',
    subtitle: 'All Blue · The Very Very Strongest · Overtaken',
    parts: 'V1 · V2 · Va · Vc I · Vc II',
    partCount: '현악 5중주',
    price: 8,
    category: 'anime',
    tag: '라이선스'
  },
  {
    id: 5,
    composer: 'John Williams',
    title: 'Star Wars Main Theme',
    subtitle: '스타워즈 메인 테마',
    parts: 'Pf · V1 · V2 · Va · Vc',
    partCount: '피아노 5중주',
    price: 8,
    category: 'film',
    tag: '라이선스'
  },
  {
    id: 6,
    composer: 'Wolfgang Amadeus Mozart',
    title: '교향곡 40번 — 1악장',
    subtitle: 'Molto allegro',
    parts: 'V1 · V2 · Va · Vc',
    partCount: '현악 4중주',
    price: 12,
    category: 'symphony',
    tag: '퍼블릭 도메인'
  }
];

let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'default';

function getFiltered() {
  return SCORES.filter(s => {
    const matchCat = currentFilter === 'all' || s.category === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q ||
      s.composer.toLowerCase().includes(q) ||
      s.title.toLowerCase().includes(q) ||
      s.parts.toLowerCase().includes(q) ||
      s.subtitle.toLowerCase().includes(q);
    return matchCat && matchSearch;
  }).sort((a, b) => {
    if (currentSort === 'price-asc') return a.price - b.price;
    if (currentSort === 'price-desc') return b.price - a.price;
    if (currentSort === 'title') return a.title.localeCompare(b.title, 'ko');
    return 0;
  });
}

function renderThumb() {
  return `<div class="score-thumb" aria-hidden="true">
    <div class="score-thumb-inner">
      ${Array(5).fill('<div class="thumb-line"></div>').join('')}
    </div>
  </div>`;
}

function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById('scoreList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('countNum');

  count.textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = filtered.map(s => `
    <li>
      <a href="score_page_purchase.html?id=${s.id}" class="score-row" aria-label="${s.composer} ${s.title}">
        ${renderThumb()}
        <div class="score-info">
          <p class="score-row-composer">${s.composer}</p>
          <p class="score-row-title">${s.title}</p>
          <div class="score-row-meta">
            <span>${s.subtitle}</span>
            <span>${s.partCount}</span>
            <span class="score-row-tag">${s.tag}</span>
          </div>
        </div>
        <div class="score-row-right">
          <span class="score-row-price">$${s.price}</span>
          <span class="score-row-parts">${s.parts}</span>
        </div>
      </a>
    </li>
  `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList();
  });
});

const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value;
  searchClear.style.display = currentSearch ? 'block' : 'none';
  renderList();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  currentSearch = '';
  searchClear.style.display = 'none';
  searchInput.focus();
  renderList();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  renderList();
});

const params = new URLSearchParams(window.location.search);
const catParam = params.get('cat');
if (catParam) {
  const btn = document.querySelector(`[data-filter="${catParam}"]`);
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = catParam;
  }
}

renderList();
</script>
</body>
</html>
